<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Students - Apex College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="app-container">
  <main id="main-content">

    <div class="container-fluid p-4 animate-fade-in">

      <!-- Header -->
      <div class="card glass-card p-4 mb-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
          <div>
            <h4 class="fw-bold mb-1">My Students</h4>
            <p class="text-secondary mb-0 small" id="class-label">Showing students from your assigned class.</p>
          </div>
        </div>

        <!-- Search -->
        <div class="row g-3 mt-3">
          <div class="col-12 col-md-6">
            <div class="input-group">
              <span class="input-group-text bg-transparent text-secondary border-end-0"><i class="bi bi-search"></i></span>
              <input type="text" id="search-input" class="form-control border-start-0" placeholder="Search name or student ID..." oninput="renderTable()">
            </div>
          </div>
          <div class="col-12 col-md-3">
            <select id="filter-risk" class="form-select" onchange="renderTable()">
              <option value="">All Students</option>
              <option value="risk">At Risk Only</option>
              <option value="good">Good Standing</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <select id="sort-select" class="form-select" onchange="renderTable()">
              <option value="name-asc">Name A→Z</option>
              <option value="cgpa-desc">CGPA (High→Low)</option>
              <option value="att-asc">Attendance (Low→High)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="card glass-card p-4">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Name & Roll</th>
                <th>Department & Year</th>
                <th>CGPA</th>
                <th>Attendance</th>
                <th>Status</th>
                <th class="text-end">Profile</th>
              </tr>
            </thead>
            <tbody id="student-table-body"></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3 pt-2 border-top border-secondary border-opacity-10">
          <div class="text-secondary small" id="pagination-status">Showing 0 of 0</div>
          <ul class="pagination pagination-sm mb-0" id="pagination-list"></ul>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script src="../js/student.js"></script>
<script src="../js/staff.js"></script>

<script>
  let myStudents = [];
  let currentPage = 1;
  const pageSize = 12;

  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      loadMyStudents();
      renderTable();
    }, 100);
  });

  function loadMyStudents() {
    const session = getSession();
    if (!session) return;

    const allStudents = getAllStudents();
    const staffRecord = getStaffById(session.linkedId);

    if (staffRecord && staffRecord.assignedClass) {
      const yearPart = staffRecord.assignedClass.split(' - ')[0];
      const sectionPart = staffRecord.assignedClass.split(' - ')[1];
      myStudents = allStudents.filter(s => s.year === yearPart && (s.section === sectionPart || !s.section));
      document.getElementById('class-label').textContent = `Class: ${staffRecord.assignedClass} · Dept: ${staffRecord.department} · ${myStudents.length} students enrolled`;
    } else {
      myStudents = allStudents;
    }
  }

  function renderTable() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    const riskFilter = document.getElementById('filter-risk').value;
    const sort = document.getElementById('sort-select').value;

    let filtered = myStudents.filter(s => {
      const matchQ = !q || s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q) || s.rollNumber.toLowerCase().includes(q);
      const isRisk = s.attendancePercent < 75 || s.cgpa < 5.0;
      const matchRisk = riskFilter === '' || (riskFilter === 'risk' && isRisk) || (riskFilter === 'good' && !isRisk);
      return matchQ && matchRisk;
    });

    filtered.sort((a, b) => {
      if (sort === 'name-asc') return a.name.localeCompare(b.name);
      if (sort === 'cgpa-desc') return b.cgpa - a.cgpa;
      if (sort === 'att-asc') return a.attendancePercent - b.attendancePercent;
      return 0;
    });

    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * pageSize;
    const end = Math.min(start + pageSize, total);
    const pageData = filtered.slice(start, end);

    const tbody = document.getElementById('student-table-body');
    tbody.innerHTML = '';

    if (total === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5"><i class="bi bi-person-slash d-block fs-1 mb-2 opacity-25"></i><span class="text-secondary">No students match your criteria.</span></td></tr>`;
      document.getElementById('pagination-status').textContent = 'No records found';
      document.getElementById('pagination-list').innerHTML = '';
      return;
    }

    pageData.forEach(s => {
      const isRisk = s.attendancePercent < 75 || s.cgpa < 5.0;
      const attColor = s.attendancePercent < 75 ? 'text-danger fw-bold' : 'text-success';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="small fw-medium">${s.id}</td>
        <td>
          <div class="fw-semibold">${s.name}</div>
          <small class="text-secondary">${s.rollNumber} · ${s.gender}</small>
        </td>
        <td><small class="text-secondary">${s.department}<br>${s.year} · Sem ${s.semester}</small></td>
        <td><strong>${(s.cgpa || 0).toFixed(2)}</strong></td>
        <td><span class="${attColor}">${s.attendancePercent}%</span></td>
        <td>${isRisk ? '<span class="badge bg-danger">At Risk</span>' : '<span class="badge bg-success">Good</span>'}</td>
        <td class="text-end">
          <a href="student-profile.html?id=${s.id}" class="btn btn-sm btn-outline-primary"><i class="bi bi-person"></i></a>
        </td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('pagination-status').textContent = `Showing ${start + 1}–${end} of ${total} students`;

    const pagList = document.getElementById('pagination-list');
    pagList.innerHTML = '';
    const prevLi = document.createElement('li');
    prevLi.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
    prevLi.innerHTML = `<button class="page-link" onclick="changePage(${currentPage - 1})">Prev</button>`;
    pagList.appendChild(prevLi);

    for (let i = 1; i <= totalPages; i++) {
      const li = document.createElement('li');
      li.className = `page-item ${currentPage === i ? 'active' : ''}`;
      li.innerHTML = `<button class="page-link" onclick="changePage(${i})">${i}</button>`;
      pagList.appendChild(li);
    }

    const nextLi = document.createElement('li');
    nextLi.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
    nextLi.innerHTML = `<button class="page-link" onclick="changePage(${currentPage + 1})">Next</button>`;
    pagList.appendChild(nextLi);
  }

  function changePage(page) {
    if (page < 1 || page > Math.ceil(myStudents.length / pageSize)) return;
    currentPage = page;
    renderTable();
  }
</script>
</body>
</html>
