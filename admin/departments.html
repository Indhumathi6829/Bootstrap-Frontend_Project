<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Departments - Apex College</title>
  <!-- Google Fonts - Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="app-container">
  <main id="main-content">
    <!-- Dynamic Navbar and Sidebar injected by app.js -->

    <div class="container-fluid p-4 animate-fade-in">
      
      <!-- Page Header -->
      <div class="card glass-card p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h4 class="fw-bold mb-1">Departments Management</h4>
            <p class="text-secondary mb-0 small">Create, edit, and delete academic branches and allocate intakes.</p>
          </div>
          <button class="btn btn-primary d-flex align-items-center gap-2" onclick="openAddModal()">
            <i class="bi bi-plus-circle"></i> Add Department
          </button>
        </div>
      </div>

      <!-- Departments Directory -->
      <div class="card glass-card p-4">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th style="width: 100px;">Code</th>
                <th>Department Name</th>
                <th>Established</th>
                <th>Student Intake</th>
                <th>Head of Department</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="departments-table-body"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Add/Edit Department Modal -->
<div class="modal fade" id="deptModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-card border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold" id="modal-title">Add Department</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="dept-form" onsubmit="handleFormSubmit(event)">
        <div class="modal-body text-secondary">
          <!-- Code -->
          <div class="mb-3">
            <label for="dept-code" class="form-label small fw-medium">Department Code <span class="text-danger">*</span></label>
            <input type="text" id="dept-code" class="form-control" placeholder="e.g. CS" required>
          </div>
          <!-- Name -->
          <div class="mb-3">
            <label for="dept-name" class="form-label small fw-medium">Department Name <span class="text-danger">*</span></label>
            <input type="text" id="dept-name" class="form-control" placeholder="e.g. Computer Science" required>
          </div>
          <!-- Established -->
          <div class="mb-3">
            <label for="dept-est" class="form-label small fw-medium">Established Year <span class="text-danger">*</span></label>
            <input type="number" id="dept-est" class="form-control" placeholder="e.g. 1985" required>
          </div>
          <!-- Intake -->
          <div class="mb-3">
            <label for="dept-intake" class="form-label small fw-medium">Annual Intake Strength <span class="text-danger">*</span></label>
            <input type="number" id="dept-intake" class="form-control" placeholder="e.g. 120" required>
          </div>
          <!-- HOD -->
          <div class="mb-3">
            <label for="dept-hod" class="form-label small fw-medium">Head of Department (HOD)</label>
            <input type="text" id="dept-hod" class="form-control" placeholder="e.g. Dr. Sarah Jenkins">
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Department</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-card border-0 shadow">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Confirm Deletion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-secondary">
        Delete department <strong id="delete-dept-name" class="text-dark"></strong>? This will permanently remove the record from academic branch allocations.
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
        <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Core Scripts -->
<script src="../js/app.js"></script>

<script>
  let departments = [];
  let editIndex = -1;
  let targetDeleteIndex = -1;
  let deptModal = null, deleteModal = null;

  document.addEventListener('DOMContentLoaded', () => {
    deptModal = new bootstrap.Modal(document.getElementById('deptModal'));
    deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
    document.getElementById('confirm-delete-btn').addEventListener('click', executeDelete);
    
    initDepartments();
    renderDepartments();
  });

  function initDepartments() {
    const raw = localStorage.getItem('cms_departments');
    if (raw) {
      departments = JSON.parse(raw);
    } else {
      // Seed default departments
      departments = [
        { code: "CS", name: "Computer Science", established: "1985", intake: 120, hod: "Dr. Sarah Jenkins" },
        { code: "EC", name: "Electronics & Communication", established: "1990", intake: 90, hod: "Prof. Rajesh Kumar" },
        { code: "IT", name: "Information Technology", established: "1998", intake: 60, hod: "Dr. Emily Stone" },
        { code: "ME", name: "Mechanical Engineering", established: "1985", intake: 120, hod: "Prof. Amit Patel" }
      ];
      saveDepartments();
    }
  }

  function saveDepartments() {
    localStorage.setItem('cms_departments', JSON.stringify(departments));
  }

  function renderDepartments() {
    const tbody = document.getElementById('departments-table-body');
    tbody.innerHTML = '';

    if (departments.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4">No departments found.</td></tr>`;
      return;
    }

    departments.forEach((d, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="fw-bold text-primary">${d.code}</td>
        <td><div class="fw-semibold">${d.name}</div></td>
        <td>${d.established}</td>
        <td>${d.intake} Students</td>
        <td>${d.hod || '<em>Unallocated</em>'}</td>
        <td class="text-end">
          <div class="d-flex justify-content-end gap-1">
            <button class="btn btn-sm btn-outline-primary" onclick="openEditModal(${idx})" title="Edit"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="promptDelete(${idx})" title="Delete"><i class="bi bi-trash"></i></button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function openAddModal() {
    editIndex = -1;
    document.getElementById('modal-title').textContent = "Add Department";
    document.getElementById('dept-form').reset();
    document.getElementById('dept-code').disabled = false;
    deptModal.show();
  }

  function openEditModal(idx) {
    editIndex = idx;
    const d = departments[idx];
    document.getElementById('modal-title').textContent = "Edit Department";
    document.getElementById('dept-code').value = d.code;
    document.getElementById('dept-code').disabled = true; // code is primary key
    document.getElementById('dept-name').value = d.name;
    document.getElementById('dept-est').value = d.established;
    document.getElementById('dept-intake').value = d.intake;
    document.getElementById('dept-hod').value = d.hod || '';
    deptModal.show();
  }

  function handleFormSubmit(event) {
    event.preventDefault();
    
    const code = document.getElementById('dept-code').value.trim().toUpperCase();
    const name = document.getElementById('dept-name').value.trim();
    const established = document.getElementById('dept-est').value;
    const intake = parseInt(document.getElementById('dept-intake').value);
    const hod = document.getElementById('dept-hod').value.trim();

    if (editIndex === -1) {
      // Add
      if (departments.some(d => d.code === code)) {
        showToast("Department code already exists!", "danger");
        return;
      }
      departments.push({ code, name, established, intake, hod });
      showToast("Department created successfully.", "success");
    } else {
      // Edit
      departments[editIndex] = { code, name, established, intake, hod };
      showToast("Department details updated.", "success");
    }
    
    saveDepartments();
    deptModal.hide();
    renderDepartments();
  }

  function promptDelete(idx) {
    targetDeleteIndex = idx;
    document.getElementById('delete-dept-name').textContent = departments[idx].name;
    deleteModal.show();
  }

  function executeDelete() {
    if (targetDeleteIndex === -1) return;
    
    const d = departments[targetDeleteIndex];
    departments.splice(targetDeleteIndex, 1);
    saveDepartments();
    deleteModal.hide();
    showToast(`Department ${d.name} deleted.`, "success");
    renderDepartments();
    
    targetDeleteIndex = -1;
  }
</script>
</body>
</html>
