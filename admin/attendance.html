<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Oversight - Apex College</title>
  <!-- Google Fonts - Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="app-container">
  <main id="main-content">
    <!-- Dynamic Navbar and Sidebar injected by app.js -->

    <div class="container-fluid p-4 animate-fade-in">
      
      <!-- Top Control Bar -->
      <div class="card glass-card p-4 mb-4">
        <h4 class="fw-bold mb-1">Attendance Roll Call</h4>
        <p class="text-secondary mb-4">Select date and filters to inspect and record class attendance.</p>
        
        <div class="row g-3 align-items-end">
          <!-- Date Picker -->
          <div class="col-12 col-md-3">
            <label for="attendance-date" class="form-label small fw-medium text-secondary">Attendance Date</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent text-secondary border-end-0"><i class="bi bi-calendar3"></i></span>
              <input type="date" id="attendance-date" class="form-control border-start-0" onchange="loadAttendanceList()">
            </div>
          </div>

          <!-- Department Filter -->
          <div class="col-12 col-sm-4 col-md-3">
            <label for="filter-dept" class="form-label small fw-medium text-secondary">Department</label>
            <select id="filter-dept" class="form-select" onchange="loadAttendanceList()">
              <option value="">All Departments</option>
              <option value="Computer Science">Computer Science</option>
              <option value="Electronics & Communication">Electronics & Communication</option>
              <option value="Information Technology">Information Technology</option>
              <option value="Mechanical Engineering">Mechanical Engineering</option>
            </select>
          </div>

          <!-- Year Filter -->
          <div class="col-12 col-sm-4 col-md-3">
            <label for="filter-year" class="form-label small fw-medium text-secondary">Year of Study</label>
            <select id="filter-year" class="form-select" onchange="loadAttendanceList()">
              <option value="">All Years</option>
              <option value="1st Year">1st Year</option>
              <option value="2nd Year">2nd Year</option>
              <option value="3rd Year">3rd Year</option>
              <option value="4th Year">4th Year</option>
            </select>
          </div>

          <!-- Semester Filter -->
          <div class="col-12 col-sm-4 col-md-3">
            <label for="filter-sem" class="form-label small fw-medium text-secondary">Semester</label>
            <select id="filter-sem" class="form-select" onchange="loadAttendanceList()">
              <option value="">All Semesters</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Attendance Stats / Summary Panel -->
      <div class="row g-4 mb-4">
        <div class="col-12 col-md-6">
          <div class="card glass-card p-3 d-flex flex-row align-items-center justify-content-between">
            <div>
              <span class="text-secondary small fw-medium">Class Attendance Average</span>
              <h3 class="fw-bold mt-1 mb-0" id="class-avg-attendance">0%</h3>
            </div>
            <div class="rounded-3 p-3 bg-primary bg-opacity-10 text-primary">
              <i class="bi bi-percent fs-3"></i>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="card glass-card p-3 d-flex flex-row align-items-center justify-content-between">
            <div>
              <span class="text-secondary small fw-medium">Active Enrolled Students</span>
              <h3 class="fw-bold mt-1 mb-0" id="class-active-students">0</h3>
            </div>
            <div class="rounded-3 p-3 bg-info bg-opacity-10 text-info">
              <i class="bi bi-people fs-3"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Attendance Recording Grid -->
      <div class="card glass-card p-4">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead>
              <tr>
                <th style="width: 120px;">Student ID</th>
                <th>Roll No</th>
                <th>Name</th>
                <th>Class Location</th>
                <th>Current Streak</th>
                <th class="text-center" style="width: 250px;">Attendance Status</th>
              </tr>
            </thead>
            <tbody id="attendance-table-body">
              <!-- Dynamically loaded rows -->
            </tbody>
          </table>
        </div>

        <!-- Bottom Actions -->
        <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top border-secondary border-opacity-10">
          <button onclick="setAllAttendance('Present')" class="btn btn-outline-success">Mark All Present</button>
          <button onclick="setAllAttendance('Absent')" class="btn btn-outline-danger">Mark All Absent</button>
          <button onclick="saveAttendanceSheet()" class="btn btn-primary px-5">Save Attendance</button>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Core Scripts -->
<script src="../js/app.js"></script>
<script src="../js/student.js"></script>

<script>
  let matchedStudents = [];

  document.addEventListener('DOMContentLoaded', () => {
    // Set date picker default value to today's local date
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('attendance-date').value = today;

    // Small delay to ensure database seed checking completes
    setTimeout(() => {
      loadAttendanceList();
    }, 80);
  });

  function loadAttendanceList() {
    const allStudents = getAllStudents();
    const attendanceData = getAttendanceData();
    
    const dateVal = document.getElementById('attendance-date').value;
    const deptVal = document.getElementById('filter-dept').value;
    const yearVal = document.getElementById('filter-year').value;
    const semVal = document.getElementById('filter-sem').value;

    if (!dateVal) {
      document.getElementById('attendance-table-body').innerHTML = `<tr><td colspan="6" class="text-center text-secondary py-4">Please select an attendance date.</td></tr>`;
      return;
    }

    // Filter matched list
    matchedStudents = allStudents.filter(s => {
      const matchDept = !deptVal || s.department === deptVal;
      const matchYear = !yearVal || s.year === yearVal;
      const matchSem = !semVal || s.semester === semVal;
      return matchDept && matchYear && matchSem;
    });

    // Render table
    const tbody = document.getElementById('attendance-table-body');
    tbody.innerHTML = '';

    if (matchedStudents.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center text-secondary py-5">No students match current filters.</td></tr>`;
      document.getElementById('class-avg-attendance').textContent = '0%';
      document.getElementById('class-active-students').textContent = '0';
    } else {
      let presentCount = 0;
      matchedStudents.forEach(s => {
        let status = 'Present'; // Default
        if (attendanceData[s.id] && attendanceData[s.id][dateVal]) {
          status = attendanceData[s.id][dateVal];
        }

        if (status === 'Present') presentCount++;

        const attClass = s.attendancePercent < 75 ? 'text-danger' : 'text-success';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="fw-medium small">${s.id}</td>
          <td class="small fw-semibold text-secondary">${s.rollNumber}</td>
          <td>
            <div class="fw-semibold">${s.name}</div>
            <small class="text-secondary">${s.gender}</small>
          </td>
          <td><small class="text-secondary">${s.department} · ${s.year}</small></td>
          <td><strong class="${attClass}">${s.attendancePercent}%</strong></td>
          <td>
            <div class="d-flex justify-content-center gap-2">
              <input type="radio" class="btn-check" name="status-${s.id}" id="present-${s.id}" value="Present" ${status === 'Present' ? 'checked' : ''}>
              <label class="btn btn-sm btn-outline-success px-3" for="present-${s.id}"><i class="bi bi-check-circle me-1"></i>Present</label>

              <input type="radio" class="btn-check" name="status-${s.id}" id="absent-${s.id}" value="Absent" ${status === 'Absent' ? 'checked' : ''}>
              <label class="btn btn-sm btn-outline-danger px-3" for="absent-${s.id}"><i class="bi bi-x-circle me-1"></i>Absent</label>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // Update counters
      const avg = ((presentCount / matchedStudents.length) * 100).toFixed(1);
      document.getElementById('class-avg-attendance').textContent = `${avg}%`;
      document.getElementById('class-active-students').textContent = matchedStudents.length;
    }
  }

  function setAllAttendance(status) {
    matchedStudents.forEach(s => {
      const radio = document.getElementById(`${status === 'Present' ? 'present' : 'absent'}-${s.id}`);
      if (radio) radio.checked = true;
    });
    
    // Recalculate quick average on page
    const checkedPresents = document.querySelectorAll('input[value="Present"]:checked').length;
    if (matchedStudents.length > 0) {
      const avg = ((checkedPresents / matchedStudents.length) * 100).toFixed(1);
      document.getElementById('class-avg-attendance').textContent = `${avg}%`;
    }
  }

  function saveAttendanceSheet() {
    const dateVal = document.getElementById('attendance-date').value;
    if (!dateVal) {
      showToast("Please select a valid date.", "warning");
      return;
    }

    if (matchedStudents.length === 0) {
      showToast("No students to save attendance for.", "warning");
      return;
    }

    const attendanceData = getAttendanceData();
    let loggedPresents = 0;

    matchedStudents.forEach(s => {
      const presentRadio = document.getElementById(`present-${s.id}`);
      const status = (presentRadio && presentRadio.checked) ? 'Present' : 'Absent';
      
      if (!attendanceData[s.id]) {
        attendanceData[s.id] = {};
      }
      attendanceData[s.id][dateVal] = status;
      if (status === 'Present') loggedPresents++;
    });

    // Save attendance list
    saveAttendanceData(attendanceData);

    // Recalculate attendance averages in student data
    updateAllStudentsAttendancePercentage();

    // Log action
    const deptFilter = document.getElementById('filter-dept').value || 'All';
    const yearFilter = document.getElementById('filter-year').value || 'All';
    logActivity('ATTENDANCE SAVED', `Marked attendance for ${matchedStudents.length} students in ${deptFilter} (${yearFilter}) for ${dateVal}.`, 'warning');

    showToast("Attendance sheet saved successfully!", "success");
    loadAttendanceList(); // reload values
  }
</script>
</body>
</html>
