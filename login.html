<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Apex College Portal</title>
  <!-- Google Fonts - Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    .theme-toggle-floating {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1050;
    }
    .demo-credentials-card {
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px dashed var(--border-color);
    }
    .demo-credentials-card:hover {
      transform: translateY(-2px);
      border-color: var(--primary-color);
      background-color: rgba(79, 70, 229, 0.05);
    }
  </style>
</head>
<body class="login-body">

  <!-- Floating Theme Toggler -->
  <div class="theme-toggle-floating">
    <button class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center border-secondary-subtle" style="width: 40px; height: 40px;" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
      <i id="theme-icon" class="bi bi-moon-fill text-primary"></i>
    </button>
  </div>

  <div class="container py-5 d-flex flex-column align-items-center justify-content-center min-vh-100">
    <!-- Back to Welcome Page Link -->
    <div class="mb-4">
      <a href="index.html" class="text-decoration-none text-secondary fw-medium small">
        <i class="bi bi-arrow-left me-1"></i> Back to Homepage
      </a>
    </div>

    <div class="card glass-card login-card text-center mb-4">
      
      <!-- College Logo Placeholder & Name -->
      <div class="mb-4">
        <div class="mx-auto bg-indigo rounded-circle text-white d-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px; background-color: var(--primary-color);">
          <i class="bi bi-mortarboard-fill fs-1"></i>
        </div>
        <h3 class="fw-bold mb-1" id="college-title" style="background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">APEX COLLEGE</h3>
        <p class="text-secondary small">Unified Management Portal</p>
      </div>

      <!-- Alert for invalid inputs -->
      <div id="login-error-alert" class="alert alert-danger d-none text-start p-2.5 small" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i> <span id="error-message">Invalid credentials</span>
      </div>

      <!-- Form -->
      <form id="login-form" onsubmit="handleLoginSubmit(event)" novalidate>
        <!-- Username -->
        <div class="mb-3 text-start">
          <label for="username" class="form-label text-secondary small fw-medium">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control border-start-0" id="username" placeholder="Enter username" required>
            <div class="invalid-feedback">Username is required.</div>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3 text-start">
          <label for="password" class="form-label text-secondary small fw-medium">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control border-start-0 border-end-0" id="password" placeholder="Enter password" required>
            <button class="btn btn-outline-secondary border-start-0 border-end-0 border-opacity-20" type="button" id="password-toggle" onclick="togglePasswordVisibility()">
              <i class="bi bi-eye" id="password-toggle-icon"></i>
            </button>
            <div class="invalid-feedback">Password is required.</div>
          </div>
        </div>

        <!-- Remember Me Checkbox -->
        <div class="mb-4 text-start">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="remember-me">
            <label class="form-check-label text-secondary small" for="remember-me">Remember Me</label>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary w-100 py-2 d-flex align-items-center justify-content-center gap-2">
          <span>Sign In</span>
          <i class="bi bi-arrow-right"></i>
        </button>
      </form>
    </div>

    <!-- Demo Accounts Selector Panel -->
    <div class="w-100" style="max-width: 420px;">
      <h6 class="text-center text-secondary small fw-semibold mb-3">Quick Login (Demo Accounts)</h6>
      <div class="row g-2">
        <!-- Admin -->
        <div class="col-4">
          <div class="card p-2 text-center demo-credentials-card rounded-3 shadow-sm bg-body" onclick="fillCredentials('admin', 'admin123')">
            <div class="text-indigo mb-1 text-primary"><i class="bi bi-shield-fill"></i></div>
            <div class="fw-semibold text-truncate" style="font-size: 0.75rem;">Admin</div>
            <div class="text-secondary" style="font-size: 0.65rem;">admin</div>
          </div>
        </div>
        <!-- Staff -->
        <div class="col-4">
          <div class="card p-2 text-center demo-credentials-card rounded-3 shadow-sm bg-body" onclick="fillCredentials('staff', 'staff123')">
            <div class="text-success mb-1" style="color: #0d9488 !important;"><i class="bi bi-person-workspace"></i></div>
            <div class="fw-semibold text-truncate" style="font-size: 0.75rem;">Faculty</div>
            <div class="text-secondary" style="font-size: 0.65rem;">staff</div>
          </div>
        </div>
        <!-- Student -->
        <div class="col-4">
          <div class="card p-2 text-center demo-credentials-card rounded-3 shadow-sm bg-body" onclick="fillCredentials('student', 'student123')">
            <div class="text-warning mb-1" style="color: #d97706 !important;"><i class="bi bi-mortarboard-fill"></i></div>
            <div class="fw-semibold text-truncate" style="font-size: 0.75rem;">Student</div>
            <div class="text-secondary" style="font-size: 0.65rem;">student</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Core Scripts -->
  <script src="js/app.js"></script>
  
  <script>
    // Adjust header based on branding
    document.addEventListener('DOMContentLoaded', () => {
      const branding = JSON.parse(localStorage.getItem('cms_branding') || '{}');
      if (branding.collegeName) {
        document.getElementById('college-title').textContent = branding.collegeName.toUpperCase();
      }
      
      const theme = localStorage.getItem('cms_theme') || 'light';
      const icon = document.getElementById('theme-icon');
      if (icon) {
        icon.className = theme === 'dark' ? 'bi bi-sun-fill text-warning' : 'bi bi-moon-fill text-primary';
      }
    });

    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const icon = document.getElementById('password-toggle-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        passwordInput.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    function fillCredentials(username, password) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      document.getElementById('remember-me').checked = true;
    }

    function handleLoginSubmit(event) {
      event.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const rememberCheckbox = document.getElementById('remember-me');
      const errorAlert = document.getElementById('login-error-alert');
      const errorMessage = document.getElementById('error-message');

      // Clear states
      usernameInput.classList.remove('is-invalid');
      passwordInput.classList.remove('is-invalid');
      errorAlert.classList.add('d-none');

      let isValid = true;
      if (!usernameInput.value.trim()) {
        usernameInput.classList.add('is-invalid');
        isValid = false;
      }
      if (!passwordInput.value.trim()) {
        passwordInput.classList.add('is-invalid');
        isValid = false;
      }

      if (!isValid) return;

      const userVal = usernameInput.value.trim().toLowerCase();
      const passVal = passwordInput.value.trim();

      // Retrieve users from database
      const users = JSON.parse(localStorage.getItem('cms_users') || '[]');
      const user = users.find(u => u.username.toLowerCase() === userVal && u.password === passVal);

      if (user) {
        const sessionData = {
          username: user.username === 'admin' ? 'Admin User' : user.username,
          role: user.role,
          linkedId: user.linkedId,
          loginTime: new Date().toISOString()
        };

        // If it's a student, let's pull their actual name
        if (user.role === 'Student') {
          const students = JSON.parse(localStorage.getItem('cms_students') || '[]');
          const stuRecord = students.find(s => s.id === user.linkedId);
          if (stuRecord) {
            sessionData.username = stuRecord.name;
          }
        } else if (user.role === 'Staff') {
          const staffList = JSON.parse(localStorage.getItem('cms_staff') || '[]');
          const staffRecord = staffList.find(s => s.id === user.linkedId);
          if (staffRecord) {
            sessionData.username = staffRecord.name;
          }
        }

        if (rememberCheckbox.checked) {
          localStorage.setItem('cms_session', JSON.stringify(sessionData));
        } else {
          sessionStorage.setItem('cms_session', JSON.stringify(sessionData));
        }

        usernameInput.classList.add('is-valid');
        passwordInput.classList.add('is-valid');

        // Redirect to their dashboard
        setTimeout(() => {
          if (user.role === 'Admin') {
            window.location.href = 'admin/dashboard.html';
          } else if (user.role === 'Staff') {
            window.location.href = 'staff/dashboard.html';
          } else if (user.role === 'Student') {
            window.location.href = 'student/dashboard.html';
          }
        }, 500);

      } else {
        errorAlert.classList.remove('d-none');
        errorMessage.textContent = "Invalid username or password. Check demo credentials.";
        
        // Shake animation effect
        const loginCard = document.querySelector('.login-card');
        loginCard.style.animation = 'none';
        setTimeout(() => {
          loginCard.style.animation = 'fadeIn 0.4s ease';
        }, 10);
      }
    }
  </script>
</body>
</html>
